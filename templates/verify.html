<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify OTP</title>
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>
<body>
    <style>
        
/* =========================
   GOOGLE FONT
========================= */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

/* =========================
   RESET
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* =========================
   BODY
========================= */
body {
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    padding: 20px;

    font-family: 'Poppins', sans-serif;

    background:
        radial-gradient(circle at top left, rgba(0,198,255,0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(0,114,255,0.25), transparent 30%),
        linear-gradient(135deg, #0f172a, #111827, #1e293b);

    overflow: hidden;
}

/* =========================
   OTP CARD
========================= */
.card {
    position: relative;

    width: 100%;
    max-width: 420px;

    padding: 35px 30px;

    border-radius: 24px;

    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.4),
        inset 0 1px 1px rgba(255,255,255,0.1);

    text-align: center;

    animation: fadeUp 0.6s ease;
}

/* TOP ICON */
.card::before {
    content: "🔐";

    position: absolute;
    top: -28px;
    left: 50%;

    transform: translateX(-50%);

    width: 60px;
    height: 60px;

    display: flex;
    justify-content: center;
    align-items: center;

    border-radius: 50%;

    background: linear-gradient(135deg, #00c6ff, #0072ff);

    font-size: 28px;

    box-shadow: 0 10px 20px rgba(0,114,255,0.35);
}

/* =========================
   HEADING
========================= */
.card h2 {
    margin-top: 18px;
    margin-bottom: 10px;

    font-size: 28px;
    font-weight: 700;

    color: #ffffff;
}

.card p {
    color: #cbd5e1;
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 20px;
}

/* =========================
   OTP INPUT BOXES
========================= */
.otp-boxes {
    display: flex;
    justify-content: center;
    gap: 12px;

    margin-top: 20px;
    margin-bottom: 10px;
}

.otp-boxes input {
    width: 55px;
    height: 60px;

    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12);

    outline: none;

    background: rgba(255,255,255,0.08);
    color: white;

    font-size: 24px;
    font-weight: 600;

    text-align: center;

    transition: 0.3s ease;
}

.otp-boxes input::placeholder {
    color: #94a3b8;
}

.otp-boxes input:focus {
    border-color: #00c6ff;

    box-shadow:
        0 0 0 4px rgba(0,198,255,0.15),
        0 0 15px rgba(0,198,255,0.2);

    transform: translateY(-2px) scale(1.03);
}

/* =========================
   VERIFY BUTTON
========================= */
.card button {
    width: 100%;

    margin-top: 18px;
    padding: 15px;

    border: none;
    border-radius: 14px;

    background: linear-gradient(135deg, #00c6ff, #0072ff);

    color: white;
    font-size: 16px;
    font-weight: 600;

    cursor: pointer;

    transition: 0.3s ease;

    box-shadow: 0 10px 20px rgba(0,114,255,0.35);
}

.card button:hover {
    transform: translateY(-3px);

    box-shadow: 0 15px 25px rgba(0,114,255,0.45);
}

.card button:active {
    transform: scale(0.98);
}

/* =========================
   TIMER
========================= */
.timer {
    margin-top: 18px;

    font-size: 14px;
    font-weight: 500;

    color: #facc15;
}

/* =========================
   RESEND TEXT
========================= */
.resend {
    margin-top: 15px;

    font-size: 14px;
    color: #cbd5e1;
}

.resend a {
    color: #00c6ff;
    text-decoration: none;
    font-weight: 600;
}

.resend a:hover {
    text-decoration: underline;
}

/* =========================
   ANIMATION
========================= */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* =========================
   MOBILE RESPONSIVE
========================= */
/* MOBILE OTP FIX */
@media (max-width: 480px) {

    .otp-boxes {
        gap: 6px;
        flex-wrap: nowrap;
    }

    .otp-boxes input {

        width: 42px;
        height: 50px;

        font-size: 18px;
    }

}
        
    </style>

<div class="card">
    <h2>🔑 OTP Verification</h2>
    <p>OTP sent to your email</p>

    <form method="POST" action="/verify">

    <input type="hidden" name="email" value="{{ email }}">

    <div class="otp-boxes">

         <input type="tel" inputmode="numeric" maxlength="1" required>
    <input type="tel" inputmode="numeric" maxlength="1" required>
    <input type="tel" inputmode="numeric" maxlength="1" required>
    <input type="tel" inputmode="numeric" maxlength="1" required>
    <input type="tel" inputmode="numeric" maxlength="1" required>
    <input type="tel" inputmode="numeric" maxlength="1" required>

    </div>

    <input type="hidden" name="otp" id="finalOtp">

    <button type="submit">
        Verify OTP
    </button>

</form>

    <p class="timer" id="timer">60 sec remaining</p>
    <form method="POST" action="/resend">
    <input type="hidden" name="email" value="{{ email }}">
    <button type="submit" style="margin-top:10px;background:#ff9800;">
        🔄 Resend OTP
    </button>
</form>
</div>

<script>

/* =========================
   TIMER
========================= */

let time = 90;

const timer = document.getElementById("timer");

const inputs = document.querySelectorAll(".otp-boxes input");

const finalOtp = document.getElementById("finalOtp");

let x = setInterval(() => {

    time--;

    timer.innerHTML = "⏳ " + time + " sec remaining";

    if(time <= 0){

        clearInterval(x);

        timer.innerHTML = "❌ OTP Expired";

        inputs.forEach(input => {

            input.disabled = true;

        });

    }

}, 1000);


/* =========================
   OTP AUTO MOVE
========================= */

inputs.forEach((input, index) => {

    input.addEventListener("input", (e) => {

        // ONLY NUMBER
        input.value = input.value.replace(/[^0-9]/g, "");

        // NEXT BOX
        if(input.value.length === 1){

            if(index < inputs.length - 1){

                inputs[index + 1].focus();

            }

        }

        updateOtp();

    });

    // BACKSPACE
    input.addEventListener("keydown", (e) => {

        if(e.key === "Backspace" && input.value === ""){

            if(index > 0){

                inputs[index - 1].focus();

            }

        }

    });

});


/* =========================
   FINAL OTP VALUE
========================= */

function updateOtp(){

    let otp = "";

    inputs.forEach(input => {

        otp += input.value;

    });

    finalOtp.value = otp;
}


/* =========================
   PASTE SUPPORT
========================= */

inputs[0].addEventListener("paste", (e) => {

    e.preventDefault();

    const data = e.clipboardData
        .getData("text")
        .slice(0, inputs.length);

    data.split("").forEach((value, i) => {

        if(inputs[i]){

            inputs[i].value = value;

        }

    });

    updateOtp();

});

</script>

</body>
</html>
