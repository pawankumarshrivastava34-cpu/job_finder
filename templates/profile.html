<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
<title>Profile</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.card{
    width:320px;
    margin:40px auto;
    padding:20px;
    background:rgba(255,255,255,0.1);
    border-radius:15px;
    text-align:center;
}

img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid #00ffd5;
}

input, textarea{
    width:90%;
    padding:8px;
    margin:8px 0;
    border-radius:6px;
    border:none;
}

button{
    padding:10px;
    background:#00ffd5;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

a{
    color:#00ffd5;
    display:block;
    margin-top:10px;
}

/* ____________ */


/* =========================
   NAV LINKS BOX
========================= */
.nav-box {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

/* =========================
   BUTTON STYLE LINKS
========================= */
.nav-box a {
    text-decoration: none;

    padding: 10px 20px;

    border-radius: 10px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);

    color: #00c6ff;

    font-weight: bold;
    font-size: 14px;

    box-shadow: 0 5px 15px rgba(0,0,0,0.3);

    transition: 0.3s;

    display: inline-block;
}

/* HOVER EFFECT */
.nav-box a:hover {
    background: #00c6ff;
    color: black;
    transform: translateY(-3px);
}

/* ACTIVE CLICK EFFECT */
.nav-box a:active {
    transform: scale(0.95);
}

/* =========================
   📱 MOBILE RESPONSIVE
========================= */
@media (max-width: 480px) {

    .nav-box {
        flex-direction: column;
        align-items: center;
    }

    .nav-box a {
        width: 80%;
        text-align: center;
    }
}

/* ================= FILE INPUT PRO DESIGN ================= */

input[type="file"]{

    width:100%;

    padding:12px;

    color:#e2e8f0;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:12px;

    cursor:pointer;

    backdrop-filter:blur(10px);

    transition:0.3s ease;
}

/* FILE BUTTON STYLE (Chrome/Edge) */

input[type="file"]::file-selector-button{

    padding:10px 16px;

    border:none;

    border-radius:10px;

    margin-right:12px;

    background:linear-gradient(135deg,#00d9ff,#38bdf8);

    color:#02131d;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s ease;
}

/* HOVER EFFECT */

input[type="file"]::file-selector-button:hover{

    transform:scale(1.05);

    box-shadow:0 0 15px rgba(0,217,255,0.4);
}

/* INPUT HOVER */

input[type="file"]:hover{

    border-color:#00d9ff;
    box-shadow:0 0 15px rgba(0,217,255,0.15);
}

/* ================= INPUT & TEXTAREA PRO ================= */

input[type="text"],
textarea{

    width:100%;

    padding:14px 16px;

    margin:10px 0;

    border-radius:12px;

    border:1px solid rgba(255,255,255,0.1);

    background:rgba(255,255,255,0.05);

    color:#e2e8f0;

    font-size:15px;

    outline:none;

    backdrop-filter:blur(10px);

    transition:0.3s ease;

    box-sizing:border-box;
}

/* ================= FOCUS EFFECT ================= */

input[type="text"]:focus,
textarea:focus{

    border-color:#00d9ff;

    box-shadow:0 0 15px rgba(0,217,255,0.2);

    transform:scale(1.02);
}

/* ================= PLACEHOLDER ================= */

input::placeholder,
textarea::placeholder{

    color:rgba(255,255,255,0.5);

    font-size:14px;
}

/* ================= TEXTAREA SIZE ================= */

textarea{

    min-height:100px;

    resize:none;
}

/* ================= HOVER EFFECT ================= */

input[type="text"]:hover,
textarea:hover{

    border-color:rgba(0,217,255,0.4);
}

</style>

</head>
<body>

<div class="card">

<h2>👤 Profile</h2>

<img src="{{ url_for('static', filename='uploads/' + user.image) }}">

<form method="POST" enctype="multipart/form-data">

    <input type="text" name="email" placeholder="Email" value="{{ user.email }}">

    <textarea name="bio" placeholder="Bio">{{ user.bio }}</textarea>

    <input type="file" name="image">

    <button type="submit">Save Profile</button>
</form>

<p><b>Username:</b> {{ user.username }}</p>

<div class="nav-box">
<a href="/">🏠 Home</a>
<a href="/logout">🚪 Logout</a>
</div>

</div>

</body>
</html>
