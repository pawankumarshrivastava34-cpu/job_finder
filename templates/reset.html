<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>
<body>
    <style>
        
/* =========================
   GOOGLE FONT
========================= */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

/* =========================
   RESET
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =========================
   BODY
========================= */
body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    overflow:hidden;

    font-family:'Outfit',sans-serif;

    background:
        radial-gradient(circle at top left,
        rgba(0,255,200,0.15), transparent 25%),

        radial-gradient(circle at bottom right,
        rgba(0,140,255,0.15), transparent 25%),

        linear-gradient(135deg,#020617,#0f172a,#111827);

    position:relative;
}

/* FLOATING GLOW */
body::before,
body::after{

    content:"";

    position:absolute;

    width:300px;
    height:300px;

    border-radius:50%;

    filter:blur(100px);

    z-index:-1;
}

body::before{

    top:-100px;
    left:-100px;

    background:#00f0ff;
}

body::after{

    bottom:-100px;
    right:-100px;

    background:#0066ff;
}

/* =========================
   CARD
========================= */
.card{

    position:relative;

    width:100%;
    max-width:430px;

    padding:45px 35px;

    border-radius:30px;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.08),
            rgba(255,255,255,0.03)
        );

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);

    box-shadow:
        0 20px 50px rgba(0,0,0,0.5),
        inset 0 1px 1px rgba(255,255,255,0.08);

    text-align:center;

    overflow:hidden;

    animation:cardShow 0.7s ease;
}

/* GLOW BORDER EFFECT */
.card::before{

    content:"";

    position:absolute;

    inset:-2px;

    border-radius:30px;

    background:
        linear-gradient(
            135deg,
            #00f0ff,
            #0066ff,
            #00f0ff
        );

    z-index:-2;

    animation:borderRotate 4s linear infinite;
}

.card::after{

    content:"";

    position:absolute;

    inset:2px;

    background:
        linear-gradient(
            145deg,
            rgba(15,23,42,0.95),
            rgba(17,24,39,0.95)
        );

    border-radius:28px;

    z-index:-1;
}

/* =========================
   ICON
========================= */
.lock-icon{

    width:85px;
    height:85px;

    margin:auto;
    margin-bottom:20px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:38px;

    background:
        linear-gradient(135deg,#00f0ff,#0066ff);

    box-shadow:
        0 15px 35px rgba(0,140,255,0.35);

    animation:float 2s ease-in-out infinite;
}

/* =========================
   TITLE
========================= */
.card h2{

    font-size:34px;
    font-weight:700;

    color:white;

    margin-bottom:10px;
}

.card p{

    color:#94a3b8;

    font-size:14px;

    line-height:1.7;

    margin-bottom:28px;
}

/* =========================
   INPUTS
========================= */
/* =========================
   PREMIUM INPUT
========================= */

.card input{

    width:100%;

    padding:17px 20px;

    margin:14px 0;

    border-radius:18px;

    border:1px solid rgba(255,255,255,0.06);

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.08),
            rgba(255,255,255,0.03)
        );

    backdrop-filter:blur(10px);

    color:white;

    font-size:15px;
    font-weight:500;

    outline:none;

    transition:0.35s ease;

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.04),
        0 6px 20px rgba(0,0,0,0.25);
}

/* PLACEHOLDER */
.card input::placeholder{

    color:#7c8aa0;

    transition:0.3s;
}

/* FOCUS EFFECT */
.card input:focus{

    border-color:#00f0ff;

    background:
        linear-gradient(
            145deg,
            rgba(255,255,255,0.10),
            rgba(255,255,255,0.04)
        );

    box-shadow:
        0 0 0 4px rgba(0,240,255,0.08),
        0 0 30px rgba(0,240,255,0.18),
        inset 0 1px 1px rgba(255,255,255,0.08);

    transform:
        translateY(-2px)
        scale(1.01);
}

/* PLACEHOLDER ANIMATION */
.card input:focus::placeholder{

    opacity:0.6;

    transform:translateX(4px);
}
/* =========================
   BUTTON
========================= */
.card button{

    position:relative;

    width:100%;

    padding:16px;

    border:none;
    border-radius:16px;

    background:
        linear-gradient(
            135deg,
            #00f0ff,
            #0066ff
        );

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    overflow:hidden;

    transition:0.35s ease;

    box-shadow:
        0 15px 30px rgba(0,140,255,0.35);
}

/* BUTTON HOVER */
.card button:hover{

    transform:translateY(-4px);

    box-shadow:
        0 20px 40px rgba(0,140,255,0.45);
}

/* SHINE EFFECT */
.card button::before{

    content:"";

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,0.4),
            transparent
        );

    transition:0.7s;
}

.card button:hover::before{
    left:100%;
}

/* =========================
   ANIMATIONS
========================= */
@keyframes cardShow{

    from{
        opacity:0;
        transform:translateY(40px) scale(0.9);
    }

    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }
}

@keyframes borderRotate{

    100%{
        filter:hue-rotate(360deg);
    }
}

/* =========================
   MOBILE
========================= */
@media (max-width:480px){

    .card{

        padding:35px 22px;

        border-radius:24px;
    }

    .lock-icon{

        width:70px;
        height:70px;

        font-size:32px;
    }

    .card h2{
        font-size:28px;
    }

    .card p{
        font-size:13px;
    }

    .input-group input{

        padding:14px;

        font-size:14px;
    }

    .card button{

        padding:14px;

        font-size:15px;
    }
}
    </style>

<div class="card">
    <h2>🔒 Reset Password</h2>
    <p>Enter new password</p>

    <form method="POST" action="/reset">
        <input type="password" name="password" id="pass1" placeholder="New Password" required>
        <input type="password" name="password" id="pass2" placeholder="Confirm Password" required>
        <button type="submit">Reset Password</button>
    </form>
</div>

    <script>
document.querySelector("form").addEventListener("submit", function(e){

    let p1 = document.getElementById("pass1").value;
    let p2 = document.getElementById("pass2").value;

    if(p1 !== p2){
        e.preventDefault();
        alert("❌ Passwords do not match!");
    }

});

</script>

</body>
</html>
