<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->

<title>Login</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->

<style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    /* background: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center/cover; */
    background-size:cover;
    position:relative;
    overflow:hidden;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
    z-index:0;
}

/* LOGIN BOX */
.container{
    position:relative;
    z-index:1;
    width:90%;
    max-width:380px;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:16px;
    box-shadow:0 15px 35px rgba(0,0,0,0.4);
    animation: fadeIn 0.4s ease-in-out;
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        transform:translateY(20px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#222;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#667eea;
    box-shadow:0 0 5px rgba(102,126,234,0.4);
}

button{
    width:100%;
    padding:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
    transform:scale(1.02);
}

/* FORGOT */
.forgot{
    text-align:right;
    margin-top:5px;
    margin-bottom:10px;
}

.forgot a{
    font-size:13px;
    color:#667eea;
    text-decoration:none;
}

/* DIVIDER */
.divider{
    text-align:center;
    margin:15px 0;
    font-size:14px;
    color:#777;
}

/* SIGNUP */
.signup{
    text-align:center;
    font-size:14px;
}

.signup a{
    color:#667eea;
    text-decoration:none;
    font-weight:600;
}

.signup a:hover{
    text-decoration:underline;
}

/* PASSWORD TOGGLE */
.password-wrapper{
    position:relative;
}

.password-wrapper span{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
}

/* RESPONSIVE */
@media(max-width:500px){
    .container{
        padding:20px;
    }
}
</style>

</head>
<body>
   

<div class="container">
     {% with messages = get_flashed_messages() %}
  {% if messages %}
    <p style="color:red; text-align:center;">
      {{ messages[0] }}
    </p>
  {% endif %}
{% endwith %}
    <h2>Login</h2>

    <form action="/login" method="post">
        <input type="text" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="forgot">
            <a href="/forgot">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="divider">or</div>

    <div class="signup">
        Don’t have an account? <a href="/signup">Sign up</a>
    </div>
</div>


<script>
// Form validation + loading effect
document.querySelector("form").addEventListener("submit", function(e){
    let email = document.querySelector("input[name='email']").value.trim();
    let password = document.querySelector("input[name='password']").value.trim();

    if(email === "" || password === ""){
        alert("All fields are required ❌");
        e.preventDefault();
        return;
    }

    // simple email check
    if(!email.includes("@")){
        alert("Enter valid email ❌");
        e.preventDefault();
        return;
    }

    // loading effect
    let btn = document.querySelector("button");
    btn.innerText = "Logging in...";
    btn.disabled = true;
});

// Show/Hide password
const passInput = document.querySelector("input[name='password']");

const toggle = document.createElement("span");
toggle.innerText = "👁️";
toggle.style.cursor = "pointer";
toggle.style.position = "absolute";
toggle.style.right = "15px";
toggle.style.top = "50%";
toggle.style.transform = "translateY(-50%)";

// wrap password input
passInput.parentElement.style.position = "relative";
passInput.parentElement.appendChild(toggle);

toggle.addEventListener("click", ()=>{
    if(passInput.type === "password"){
        passInput.type = "text";
        toggle.innerText = "🙈";
    } else {
        passInput.type = "password";
        toggle.innerText = "👁️";
    }
});

    
{% if msg %}
<script>
  const toastEl = document.getElementById('liveToast');
  const toast = new bootstrap.Toast(toastEl);
  toast.show();
</script>
{% endif %}
    
</script>
//     {% if msg %}
// <script>
    alert("{{ msg }}");
</script>
 {% endif %} -->

</body>
</html>
