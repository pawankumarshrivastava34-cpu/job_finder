<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->

<title>Login</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->

<style>
   *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

html, body{
    width:100%;
    height:100%;
}

/* MAIN BACKGROUND */
body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center center;
    background-size:cover;
    position:relative;
}

/* DARK OVERLAY */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
    backdrop-filter: blur(6px);
    z-index:0;
}

/* LOGIN CARD */
.container{
    position:relative;
    z-index:1;

    width:100%;
    max-width:380px;

    margin:0 auto;

    background:rgba(255,255,255,0.95);
    padding:28px;
    border-radius:18px;

    box-shadow:0 20px 50px rgba(0,0,0,0.5);

    display:flex;
    flex-direction:column;

    animation: pop 0.35s ease-in-out;
}

/* ANIMATION */
@keyframes pop{
    from{
        transform:scale(0.9);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

h2{
    text-align:center;
    margin-bottom:18px;
    color:#222;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#667eea;
    box-shadow:0 0 0 3px rgba(102,126,234,0.2);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:10px;

    background:#667eea;
    color:white;
    border:none;
    border-radius:10px;

    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

button:hover{
    background:#5a67d8;
    transform:translateY(-2px);
}

/* FORGOT */
.forgot{
    text-align:right;
    margin-top:6px;
}

.forgot a{
    font-size:13px;
    color:#667eea;
    text-decoration:none;
}

/* DIVIDER */
.divider{
    text-align:center;
    margin:15px 0;
    font-size:13px;
    color:#666;
}

/* SIGNUP */
.signup{
    text-align:center;
    font-size:14px;
}

.signup a{
    color:#667eea;
    font-weight:600;
    text-decoration:none;
}

/* PASSWORD TOGGLE FIX */
.password-wrapper{
    position:relative;
}

.password-wrapper span{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:18px;
}

/* MOBILE FIX (IMPORTANT) */
@media(max-width:500px){

    body{
        padding:15px;
    }

    .container{
        width:100%;
        max-width:100%;
        border-radius:14px;
    }
}
</style>

</head>
<body>
   

<div class="container">
     {% with messages = get_flashed_messages() %}
  {% if messages %}
    <p style="color:red; text-align:center;">
      {{ messages[0] }}
    </p>
  {% endif %}
{% endwith %}
    <h2>Login</h2>

    <form action="/login" method="post">
        <input type="text" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <div class="forgot">
            <a href="/forgot">Forgot password?</a>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="divider">or</div>

    <div class="signup">
        Don’t have an account? <a href="/signup">Sign up</a>
    </div>
</div>


<script>
// Form validation + loading effect
document.querySelector("form").addEventListener("submit", function(e){
    let email = document.querySelector("input[name='email']").value.trim();
    let password = document.querySelector("input[name='password']").value.trim();

    if(email === "" || password === ""){
        alert("All fields are required ❌");
        e.preventDefault();
        return;
    }

    // simple email check
    if(!email.includes("@")){
        alert("Enter valid email ❌");
        e.preventDefault();
        return;
    }

    // loading effect
    let btn = document.querySelector("button");
    btn.innerText = "Logging in...";
    btn.disabled = true;
});

// Show/Hide password
const passInput = document.querySelector("input[name='password']");

const toggle = document.createElement("span");
toggle.innerText = "👁️";
toggle.style.cursor = "pointer";
toggle.style.position = "absolute";
toggle.style.right = "15px";
toggle.style.top = "50%";
toggle.style.transform = "translateY(-50%)";

// wrap password input
passInput.parentElement.style.position = "relative";
passInput.parentElement.appendChild(toggle);

toggle.addEventListener("click", ()=>{
    if(passInput.type === "password"){
        passInput.type = "text";
        toggle.innerText = "🙈";
    } else {
        passInput.type = "password";
        toggle.innerText = "👁️";
    }
});

    
{% if msg %}
<script>
  const toastEl = document.getElementById('liveToast');
  const toast = new bootstrap.Toast(toastEl);
  toast.show();
</script>
{% endif %}
    
</script>
//     {% if msg %}
// <script>
    alert("{{ msg }}");
</script>
 {% endif %} -->

</body>
</html>
